<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Aviario Local</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500&family=Inter:wght@400;500;600;700&family=Caveat:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg-cream: #FAF6EE;
    --bg-paper: #F5EFE0;
    --bg-warm: #FBF9F3;
    --moss-900: #2E3A28;
    --moss-700: #3F4A2E;
    --moss-600: #5C6B47;
    --moss-500: #6E7E55;
    --moss-300: #A8B493;
    --moss-100: #DCE2CC;
    --bark-700: #4A3A28;
    --bark-500: #7A5A3A;
    --bark-400: #A68B5B;
    --bark-200: #D4C4A0;
    --bark-100: #E8DCC4;
    --ink: #1F1B14;
    --ink-soft: #4A4438;
    --ink-mute: #8A8270;
    --line: #E0D6BD;
    --line-soft: #ECE4D0;
    --accent-red: #B5462E;
    --accent-gold: #C9A05A;
  }
  * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background:
      radial-gradient(1200px 800px at 20% 10%, #EFE8D2 0%, transparent 60%),
      radial-gradient(1000px 700px at 90% 90%, #E6DDC2 0%, transparent 55%),
      #DDD3B6;
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
  }
  #root { width: 100%; max-width: 100%; display: flex; justify-content: center; }

  /* Reusable utility */
  .serif { font-family: 'Fraunces', 'Iowan Old Style', Georgia, serif; font-optical-sizing: auto; }
  .hand { font-family: 'Caveat', cursive; }
  .sans { font-family: 'Inter', system-ui, sans-serif; }

  /* Hide scrollbars in scrollable areas inside frame */
  .nice-scroll::-webkit-scrollbar { width: 0; height: 0; }
  .nice-scroll { scrollbar-width: none; }

  /* paper texture */
  .paper {
    background-color: var(--bg-cream);
    background-image:
      radial-gradient(rgba(122,90,58,0.05) 1px, transparent 1px),
      radial-gradient(rgba(122,90,58,0.04) 1px, transparent 1px);
    background-size: 18px 18px, 24px 24px;
    background-position: 0 0, 9px 12px;
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="primitives.jsx"></script>
  <script type="text/babel" src="screens-gallery.jsx"></script>
  <script type="text/babel" src="screens-detail.jsx"></script>
  <script type="text/babel" src="screens-map.jsx"></script>
  <script type="text/babel" src="screens-stats.jsx"></script>
  <script type="text/babel" src="screens-add.jsx"></script>
  <script type="text/babel" src="screens-profile.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
